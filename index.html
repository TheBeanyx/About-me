<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazsi Története</title>
    <style>
        :root {
            --paper: #f9f4e8;
            --ink: #2c3e50;
            --accent: #e74c3c;
        }

        body {
            background-color: #d1ccc0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
        }

        .book-page {
            width: 95%;
            max-width: 650px;
            min-height: 550px;
            background: var(--paper);
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.05) 0%, transparent 5%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.5) 0%, transparent 100%);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 2px 10px 10px 2px;
            position: relative;
            box-sizing: border-box;
            border-left: 15px solid #34495e;
        }

        #story-wrapper {
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--ink);
            word-wrap: break-word;
        }

        .text-segment {
            white-space: pre-wrap;
            display: inline;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.4rem;
            background: var(--accent);
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Négyzet alakú pörgető */
        .slot-machine {
            display: none;
            margin: 30px auto;
            width: 280px;
            height: 80px;
            border: 3px solid var(--ink);
            background: white;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
        }

        .slot-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            text-align: center;
        }

        .slot-item {
            height: 80px;
            line-height: 80px;
            font-size: 1.2rem;
            color: var(--ink);
            border-bottom: 1px solid #f0f0f0;
            box-sizing: border-box;
        }

        .highlight-item {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<div class="book-page">
    <div id="story-wrapper">
        <span id="output" class="text-segment"></span><span id="cursor" class="cursor"></span>
    </div>

    <div class="slot-machine" id="function-box">
        <div class="slot-container" id="slot-list"></div>
    </div>
</div>

<script>
    const output = document.getElementById('output');
    const cursor = document.getElementById('cursor');
    const slotList = document.getElementById('slot-list');
    const functionBox = document.getElementById('function-box');

    const names = [
        "Anna", "Bíborka", "Csilla", "Dóra", "Eszter", "Fanni", "Gréta", "Hanna", "Izabella", "Jázmin",
        "Kitti", "Luca", "Míra", "Nóra", "Olívia", "Panna", "Réka", "Sára", "Tímea", "Vanda",
        "Zita", "Adél", "Beáta", "Cintia", "Dorina", "Enikő", "Flóra", "Gizella", "Hajnalka", "Iringó",
        "Johanna", "Kamilla", "Lilla", "Maja", "Natasa", "Orsolya", "Petra", "Rozina", "Szonja", "Tekla",
        "Virág", "Zelma", "Abigél", "Barbara", "Diána", "Emese", "Fruzsina", "Georgina", "Henrietta", "Ildikó",
        "Júlia", "Kinga", "Lili", "Mercédesz", "Nikolett", "Pálma", "Renáta", "Szandra", "Teréz", "Vivien",
        "Zsanett", "Aliz", "Bianka", "Dalma", "Evelin", "Felicita", "Glória", "Hermina", "Ivett", "Janka",
        "Klaudia", "Léna", "Mariann", "Nelli", "Patrícia", "Rebeka", "Szonja", "Tünde", "Valéria", "Zsuzsa",
        "Anett", "Boglárka", "Dominika", "Edina", "Friderika", "Genovéva", "Hilda", "Irén", "Jolán", "Kornélia",
        "Laura", "Mónika", "Noémi", "Paula", "Roxána", "Szabina", "Teca", "Vica", "Zorka", "Zselyke"
    ];

    const target = "Nincs másik személy";
    const fullList = [...names, target];
    
    fullList.forEach(name => {
        const div = document.createElement('div');
        div.className = 'slot-item';
        if(name === target) div.classList.add('highlight-item');
        div.innerText = name;
        slotList.appendChild(div);
    });

    async function type(text) {
        for (let char of text) {
            output.innerText += char;
            // A kurzort mindig az utolsó karakter után tartjuk
            output.appendChild(cursor); 
            await new Promise(r => setTimeout(r, 50));
        }
    }

    async function startStory() {
        await type("Szia Bazsi vagyok!\n");
        await new Promise(r => setTimeout(r, 500));
        await type("Most megtudhatsz rólam többet.\n");
        await new Promise(r => setTimeout(r, 500));
        await type("Ebben a kis történetben elmesélem a szerelmi életetem.\n");
        await new Promise(r => setTimeout(r, 500));
        await type("Nézzük ki a másik személy ebben a kis történetben");
        
        await new Promise(r => setTimeout(r, 800));
        functionBox.style.display = 'block';
        
        // Pörgetés indítása
        const itemHeight = 80;
        const stopAt = (fullList.length - 1) * itemHeight;
        
        // Kis késleltetés a látvány kedvéért
        setTimeout(() => {
            slotList.style.transform = `translateY(-${stopAt}px)`;
        }, 500);

        // Megvárjuk a pörgetést (5 másodperc a CSS-ben)
        await new Promise(r => setTimeout(r, 6000));

        await type("\nRemélem tetszett ez a kis bemutatkozás rólam.");
    }

    window.onload = startStory;
</script>

</body>
</html>
